    <!--
      Archivo for display type, Noto Sans Ethiopic for Amharic. Ethiopic must be
      loaded up front, not lazily: the app can start in Amharic, and a font swap
      on the very first paint is far more jarring in Ge'ez than in Latin script.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800;900&family=Noto+Sans+Ethiopic:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
