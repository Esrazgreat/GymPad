<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#120A1F" />
    <meta name="description" content="GymPad — your pocket gym. Free workout plans, AI coaching, in English and Amharic." />

    <title>GymPad — ጂምፓድ</title>

    <!--
      Archivo for display type, Noto Sans Ethiopic for Amharic. Ethiopic must be
      loaded up front, not lazily: the app can start in Amharic, and a font swap
      on the very first paint is far more jarring in Ge'ez than in Latin script.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800;900&family=Noto+Sans+Ethiopic:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <!--
      Critical inline styles. The Tailwind bundle loads with the JS, so without
      this the page paints WHITE for a moment on every load before the dark theme
      arrives — jarring on a dark app. Setting the background here, plus a splash
      spinner inside #root (which React replaces on mount), means the very first
      paint is already on-brand and shows motion, so a slow network reads as
      "loading" rather than "broken".
    -->
    <style>
      html, body { margin: 0; background: #120a1f; color: #f5f0ff; }
      #gp-splash {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: radial-gradient(1000px 500px at 80% -10%, rgba(255,107,53,0.16), transparent), #120a1f;
      }
      #gp-splash .ring {
        width: 42px; height: 42px; border-radius: 50%;
        border: 3px solid rgba(255,255,255,0.12); border-top-color: #ff6b35;
        animation: gp-spin 0.8s linear infinite;
      }
      @keyframes gp-spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) { #gp-splash .ring { animation: none; } }
    </style>
  </head>
  <body>
    <div id="root"><div id="gp-splash"><div class="ring"></div></div></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
