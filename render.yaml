# Render blueprint for the GymPad API.
#   Dashboard → New → Blueprint → point at this repo.
# Secrets are marked `sync: false` so Render prompts for them instead of them
# ever living in git.
services:
  - type: web
    name: gympad-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false # set to the Vercel URL once the frontend is deployed
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_SCREENING_MODEL
        value: claude-opus-4-8
      - key: ANTHROPIC_COACH_MODEL
        value: claude-sonnet-5
      - key: JWT_SECRET
        generateValue: true
